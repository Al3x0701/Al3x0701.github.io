<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Asistencia — Impulso Ciudadano</title>
  <link rel="stylesheet" href="registro.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <div class="registro-page">

    <div class="registro-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#facc15" stroke-width="2">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <span>Impulso Ciudadano</span>
    </div>

    <div class="registro-card" id="card-principal">

      <!-- ── Estado: cargando ── -->
      <div id="estado-cargando" class="estado-bloque">
        <div class="spinner"></div>
        <p>Cargando eventos disponibles…</p>
      </div>

      <!-- ── Estado: sin eventos ── -->
      <div id="estado-sin-eventos" class="estado-bloque" style="display:none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p class="estado-titulo">No hay eventos activos</p>
        <p class="estado-sub">En este momento no hay eventos disponibles para registro.<br>Consulta con el organizador del evento.</p>
      </div>

      <!-- ── Formulario ── -->
      <form id="form-registro" style="display:none" novalidate>

        <div class="form-seccion">
          <div class="seccion-num">1</div>
          <div class="seccion-body">
            <h2 class="seccion-titulo">Selecciona tu evento</h2>
            <div class="campo">
              <label>Evento al que asistes *</label>
              <select id="select-evento" name="evento_id" required>
                <option value="">— Selecciona un evento —</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-seccion" id="seccion-datos" style="display:none">
          <div class="seccion-num">2</div>
          <div class="seccion-body">
            <h2 class="seccion-titulo">Tus datos</h2>
            <div class="campos-grid">
              <div class="campo campo-completo">
                <label>Nombre completo *</label>
                <input type="text" name="nombre_completo" placeholder="Ej. Juan Pérez García" required>
              </div>
              <div class="campo">
                <label>Cédula *</label>
                <input type="text" name="cedula" placeholder="Ej. 1234567890" required inputmode="numeric">
              </div>
              <div class="campo">
                <label>Teléfono</label>
                <input type="tel" name="telefono" placeholder="Ej. 3001234567" inputmode="numeric">
              </div>
              <div class="campo campo-completo">
                <label>Referido por *</label>
                <select name="referido" id="select-referido-asistencia" required>
                  <option value="">— Selecciona un organizador —</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div id="registro-alerta" class="alerta" style="display:none"></div>

        <button type="submit" class="btn-registrar" id="btn-registrar" style="display:none">
          Registrar asistencia
        </button>

      </form>

      <!-- ── Estado: éxito ── -->
      <div id="estado-exito" class="estado-bloque" style="display:none">
        <div class="icono-check">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <p class="estado-titulo">¡Registro exitoso!</p>
        <p class="estado-sub" id="exito-nombre"></p>
        <p class="estado-sub">Tu asistencia ha sido registrada correctamente.</p>
        <button class="btn-registrar btn-otro" id="btn-otro-registro">Registrar otra persona</button>
      </div>

    </div>

  </div>

  <script src="registro.js"></script>
</body>
</html>
